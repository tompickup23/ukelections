<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- UK Demographics — Stacked Logo (square, for social avatars) -->

  <!-- Background -->
  <rect width="200" height="220" rx="20" fill="#04070d"/>

  <!-- Population bars -->
  <rect x="30" y="80" width="30" height="56" rx="6" fill="#4f46e5"/>
  <rect x="66" y="54" width="30" height="82" rx="6" fill="#4f46e5" opacity="0.8"/>
  <rect x="102" y="32" width="30" height="104" rx="6" fill="#4f46e5" opacity="0.6"/>
  <rect x="138" y="14" width="30" height="122" rx="6" fill="#4f46e5" opacity="0.4"/>

  <!-- Trend line -->
  <path d="M45 76 L81 50 L117 28 L153 10" stroke="#818cf8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="45" cy="76" r="4" fill="#818cf8"/>
  <circle cx="153" cy="10" r="4" fill="#10b981"/>

  <!-- Text -->
  <text x="100" y="162" text-anchor="middle" font-family="'Manrope', Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#f5f7fb">UK</text>
  <text x="100" y="186" text-anchor="middle" font-family="'Manrope', Inter, system-ui, sans-serif" font-size="18" font-weight="400" letter-spacing="3" fill="#91a7c4">DEMOGRAPHICS</text>

  <!-- Accent -->
  <rect x="30" y="194" width="140" height="2" rx="1" fill="#4f46e5"/>

  <!-- Tagline -->
  <text x="100" y="212" text-anchor="middle" font-family="'Manrope', Inter, system-ui, sans-serif" font-size="7" font-weight="500" fill="#91a7c4" letter-spacing="1.5">POPULATION DATA FOR EVERY COMMUNITY</text>
</svg>
