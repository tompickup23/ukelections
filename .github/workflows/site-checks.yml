name: Site checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run validate:backend
      - run: npm run check
      - run: npm run build
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: build-diagnostics
          path: |
            dist
            .astro
